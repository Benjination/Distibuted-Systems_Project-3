user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # PROJECT 3 CHANGE: expanded from 2 servers (original) to 5 servers (a–e)
    # to satisfy the minimum 5-node requirement for 2PC and Raft.
    # NGINX round-robins inbound gRPC traffic across all active participants.
    upstream grpc_servers {
        server api-server-a:50051;
        server api-server-b:50051;
        server api-server-c:50051;
        server api-server-d:50051;
        server api-server-e:50051;
    }

    server {
        listen 8080 http2;

        location / {
            grpc_pass grpc://grpc_servers;
            error_page 502 = /error502grpc;
        }

        location = /error502grpc {
            internal;
            default_type application/grpc;
            add_header grpc-status 14;
            add_header content-length 0;
            return 204;
        }
    }
}
