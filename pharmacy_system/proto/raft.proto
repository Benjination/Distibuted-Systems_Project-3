syntax = "proto3";

package raft;

// =====================
// Raft Service
// =====================
service Raft {
  rpc RequestVote (RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse);
}

// =====================
// RequestVote RPC
// =====================
message RequestVoteRequest {
  int32 term = 1;           // Candidate’s current term
  int32 candidate_id = 2;   // Candidate requesting vote
}

message RequestVoteResponse {
  int32 term = 1;           // Current term of responder
  bool vote_recieved = 2;    // True if vote granted
}

// =====================
// AppendEntries RPC (Heartbeat only)
// =====================
message AppendEntriesRequest {
  int32 term = 1;           // Leader’s term
  int32 leader_id = 2;      // Leader ID
}

message AppendEntriesResponse {
  int32 term = 1;           // Current term of follower
  bool success = 2;         // Always true for heartbeat
}